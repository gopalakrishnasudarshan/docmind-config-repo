server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/docmind_db?currentSchema=auth
    username: postgres
    password: '{cipher}your_encrypted_password_here'
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: auth
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    jwt:
      secret: '{cipher}your_encrypted_jwt_secret_here'
      expiration-ms: 86400000        # 24 hours
      refresh-expiration-ms: 604800000  # 7 days

logging:
  level:
    com.docmind.authgateway: DEBUG
    org.springframework.security: DEBUG