server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/docmind_db?currentSchema=auth
    username: postgres
    password: '{cipher}a84d1abec6c38392076f01671913333598ffef9244861247b6a9e5c0e79f3bf1'
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: auth
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: auth
    baseline-on-migrate: true
    validate-on-migrate: true

  security:
    jwt:
      secret: '{cipher}your_encrypted_jwt_secret_here'
      expiration-ms: 86400000
      refresh-expiration-ms: 604800000

logging:
  level:
    com.docmind.authgateway: DEBUG
    org.springframework.security: DEBUG
